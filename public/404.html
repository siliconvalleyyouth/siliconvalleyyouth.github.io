<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Page Not Found</title>
  <link rel="icon" href="/logo.png">
  <link href="https://fonts.googleapis.com/css?family=Lato:300|Raleway:300" rel="stylesheet">
  <link rel="stylesheet" href="/main.css">
  <style>
    body { font-family: Lato, Arial, sans-serif; margin: 0; color: #222; }
    .not-found { max-width: 520px; margin: 100px auto; padding: 24px; }
    .draft-preview { max-width: 980px; margin: 120px auto 60px; padding: 0 24px; }
    .draft-preview h1 { font-family: Raleway, Arial, sans-serif; }
    .draft-class-list { list-style: none; padding: 0; }
    .draft-class-item { border-left: 4px solid #bbb; padding: 12px 14px; margin: 10px 0; background: #f8f8f8; }
    .draft-class-item a { font-size: 20px; }
    .draft-status { display: inline-block; margin-left: 8px; padding: 2px 7px; border-radius: 3px; color: #fff; font-size: 13px; text-transform: uppercase; }
    .draft-status.published { background: #2f7d32; }
    .draft-status.closed { background: navy; }
    .draft-status.draft { background: #777; }
    .draft-status.failed { background: #b00020; }
    .draft-class-item.failed, .draft-error-panel { border-left-color: #b00020; background: #fff1f2; }
    .draft-error, .draft-error-panel { color: #8a0018; font-weight: bold; }
    .draft-error-panel { border-left: 4px solid #b00020; padding: 12px 14px; margin: 12px 0; }
    .draft-banner { background: #fff7d6; border-left: 4px solid #c78900; padding: 12px 14px; margin: 12px 0; }
    .draft-meta p { margin: 8px 0; }
    pre { white-space: pre-wrap; font-family: Lato, Arial, sans-serif; font-size: 18px; background: #fff; border: 0; }
  </style>
</head>
<body>
  <main id="app">
    <div class="not-found">
      <h1>Page Not Found</h1>
      <p>The specified file was not found on this website. Please check the URL for mistakes and try again.</p>
    </div>
  </main>
  <script>
    var serverBaseUrl = "https://siliconvalleyyouth.herokuapp.com";

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function parseDraftRoute() {
      var match = window.location.pathname.match(/^\/draft\/([0-9]{4})\/([a-z]+)(?:\/(main\.html)?)?\/?$/i);
      if (!match) return null;
      return {
        year: match[1],
        term: match[2].toLowerCase(),
        detail: Boolean(match[3])
      };
    }

    function renderShell(title, body) {
      document.title = title;
      document.getElementById("app").innerHTML = "<section class=\"draft-preview\">" + body + "</section>";
    }

    function renderDraftList(route, res) {
      var html = "<h1>" + escapeHtml(route.year + " " + route.term + " Draft Classes") + "</h1>";
      html += "<div class=\"draft-banner\">Draft preview. These classes are not shown on the public class list until published.</div>";
      if (!res.classes || res.classes.length === 0) {
        html += "<p>No draft classes found.</p>";
        renderShell("Draft Classes", html);
        return;
      }
      html += "<ul class=\"draft-class-list\">";
      for (var i = 0; i < res.classes.length; i++) {
        var item = res.classes[i];
        var status = (item.publish_status || "published").toLowerCase();
        var detailUrl = "/draft/" + encodeURIComponent(route.year) + "/" + encodeURIComponent(route.term) + "/main.html?id=" + encodeURIComponent(item.selector);
        html += "<li class=\"draft-class-item " + escapeHtml(status) + "\">";
        html += "<a href=\"" + detailUrl + "\">" + escapeHtml(item.title || item.classname || item.selector) + "</a>";
        html += "<span class=\"draft-status " + escapeHtml(status) + "\">" + escapeHtml(status) + "</span>";
        if (status === "failed" && item.publish_error) {
          html += "<div class=\"draft-error\">Publish error: " + escapeHtml(item.publish_error) + "</div>";
        }
        html += "</li>";
      }
      html += "</ul>";
      renderShell("Draft Classes", html);
    }

    function renderDraftDetail(route, res) {
      var data = JSON.parse(res.data);
      var status = (data.publish_status || "published").toLowerCase();
      var html = "<h1>" + escapeHtml(data.classname || "Draft Class") + "</h1>";
      html += "<div class=\"draft-banner\">Draft preview. This class is not shown on the public class list until published.</div>";
      if (status === "failed" && data.publish_error) {
        html += "<div class=\"draft-error-panel\">Publish error: " + escapeHtml(data.publish_error) + "</div>";
      }
      html += "<div class=\"draft-meta\">";
      html += "<p>" + escapeHtml(data.classdescription || "") + "</p>";
      html += "<p><strong>Prerequisites:</strong> " + escapeHtml(data.prerequisites || "") + "</p>";
      html += "<p><strong>Dates:</strong> " + escapeHtml(data.dates || "") + "</p>";
      html += "<p><strong>Time:</strong> " + escapeHtml(data.time || "") + "</p>";
      html += "<p><strong>Location:</strong> " + escapeHtml(data.location || "") + "</p>";
      html += "<p><strong>Grades:</strong> " + escapeHtml(data.graderange || "") + "</p>";
      html += "<p><strong>Teacher:</strong> " + escapeHtml(data.teacher1 || "") + " " + escapeHtml(data.teacher1email || "") + "</p>";
      html += "<p>" + escapeHtml(data.t1bio || "") + "</p>";
      html += "<h2>Syllabus</h2><pre>" + escapeHtml(data.classsyllabus || "") + "</pre>";
      html += "</div>";
      renderShell(data.classname || "Draft Class", html);
    }

    function loadDraftRoute() {
      var route = parseDraftRoute();
      if (!route) return;
      var id = getParam("id");
      var apiTerm = route.term + "-draft";
      var url = route.detail
        ? serverBaseUrl + "/api/classes/" + encodeURIComponent(route.year) + "/" + encodeURIComponent(apiTerm) + "/" + encodeURIComponent(id || "")
        : serverBaseUrl + "/api/classes/" + encodeURIComponent(route.year) + "/" + encodeURIComponent(apiTerm) + "/list";
      fetch(url)
        .then(function(response) {
          if (!response.ok) throw new Error("Draft preview unavailable");
          return response.json();
        })
        .then(function(res) {
          if (route.detail) renderDraftDetail(route, res);
          else renderDraftList(route, res);
        })
        .catch(function(error) {
          renderShell("Draft Preview Unavailable", "<h1>Draft Preview Unavailable</h1><p>" + escapeHtml(error.message) + "</p>");
        });
    }

    loadDraftRoute();
  </script>
</body>
</html>
